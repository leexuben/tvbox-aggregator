name = "tvbox-aggregator"
main = "src/cf-entry.ts"
compatibility_date = "2024-12-30"

# 自定义域名（可选，推荐配置）
# 取消注释并替换为你自己的域名和 Zone ID
routes = [
   { pattern = "leexuben.qzz.io/*", zone_id = "fc52331753ebceb05bed347d63593f6d" }
 ]

[triggers]
crons = ["0 * * * *"]  # 每小时触发，实际执行频率由 Admin 设置的聚合间隔控制

[[kv_namespaces]]
binding = "KV"
id = "1d7c37e819434fa9922057310a41f989"
preview_id = "ba0ba8b5866c4ac3a06efcd4df209627"

[vars]
SPEED_TIMEOUT_MS = "5000"   # 源地址延迟阈值（毫秒）
SITE_TIMEOUT_MS = "3000"    # 站点 API 延迟阈值（毫秒）
FETCH_TIMEOUT_MS = "5000"   # 抓取配置 JSON 超时（毫秒）
WORKER_BASE_URL = "https://leexuben.qzz.io"  # CF 边缘代理依赖此配置（JAR/MacCMS/直播源代理）
compatibility_flags = ["nodejs_compat"]